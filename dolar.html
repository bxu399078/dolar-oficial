<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dólar Oficial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 40px rgba(0, 20, 40, 0.4);
            text-align: center;
        }
        .logo {
            font-size: 2.4em;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 1.4em;
            font-weight: 600;
            color: #1e3a5f;
            margin-bottom: 25px;
            letter-spacing: -0.3px;
        }
        #btn-consultar {
            background: #1e5b9e;
            border: none;
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
            box-shadow: 0 6px 16px rgba(30, 91, 158, 0.35);
            letter-spacing: 0.2px;
            margin-bottom: 25px;
        }
        #btn-consultar:hover {
            background: #174b82;
            box-shadow: 0 8px 20px rgba(30, 91, 158, 0.5);
            transform: translateY(-2px);
        }
        #btn-consultar:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(30, 91, 158, 0.4);
        }
        #output {
            background: #f0f5fb;
            border-radius: 14px;
            padding: 22px 18px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.95em;
            color: #1a2b3c;
            line-height: 1.7;
            text-align: left;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #d9e5f2;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.75em;
            color: #7f8c9b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💵</div>
        <h1>Cotización Dólar Oficial</h1>
        <button id="btn-consultar">Consultar ahora</button>
        <pre id="output">Presioná el botón para ver la cotización...</pre>
        <div class="footer">Banco Nación Argentina</div>
    </div>

    <script src="dolar.js"></script>
</body>
</html>
